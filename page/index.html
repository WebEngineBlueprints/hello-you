<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Hello, you!</title>
</head>
<body>
	<h1>Hello, <span data-bind:text="your-name">you</span>!</h1>

	<form method="post">
		<label>
			<span>What is your name?</span>
			<input name="your-name" required autocomplete="off" autofocus />
		</label>

		<button name="do" value="greet">Greet!</button>

		<br />

		<button name="do" value="reset" formnovalidate>Reset</button>
	</form>
</body>
</html>
